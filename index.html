<!DOCTYPE html>
<html>
    <head>
        <title>Student Performance Analyzer</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f4f6f9;
                text-align: center;
            }
            h1 {
                color: #2c3e50;
            }
            table {
                margin: auto;
                border-collapse: collapse;
                width: 70%;
                background-color: white;
            }
            th, td {
                background-color: #3498db;
                color: white;
            }
            .card {
                background-color: white;
                padding: 15px;
                margin: 20px auto;
                width: 40%;
                border-radius: 8px;
                bow-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            }
        </style>
    </head>
    <body>
        <h1> Student Performance Analyzer</h1>
        <div class="card">
            <h2> Topper</h2>
            <p>Meera - 367 Marks</p>
        </div>
        <div class ="card">
            <h2> Pass / Fail</h2>
            <p>Pass: 9</p>
            <p>Fail: 1</p>
        </div>
    </body>
</html>
